<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Empréstimo - SGEB Angola</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a1a3a 0%, #0d1f44 100%);
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 30px; }
        
        .header {
            background: linear-gradient(135deg, #0a1a3a 0%, #0d1f44 100%);
            color: white;
            padding: 18px 0;
            border-bottom: 3px solid #c9a03d;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header-content { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .logo { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .logo-icon { width: 50px; height: 50px; background: linear-gradient(135deg, #c9a03d, #e6c468); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #0a1a3a; }
        .logo-text h1 { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, #fff, #c9a03d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-text p { font-size: 0.75rem; color: #c9a03d; letter-spacing: 2px; }
        .nav-menu { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
        .nav-link {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 40px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .nav-link:hover { background: rgba(201,160,61,0.2); color: #c9a03d; }
        .nav-link.active { background: linear-gradient(135deg, #c9a03d, #e6c468); color: #0a1a3a; font-weight: 600; }
        .btn-sair { background: #c62828; padding: 8px 20px; border-radius: 8px; }
        
        .main-content { padding: 40px 0; }
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid rgba(201,160,61,0.2);
        }
        .card-header {
            padding: 22px 28px;
            background: linear-gradient(135deg, #f8f9fa, #fff);
            border-bottom: 2px solid #c9a03d;
        }
        .card-header h1 { font-size: 1.3rem; font-weight: 700; color: #0a1a3a; display: flex; align-items: center; gap: 10px; }
        .card-header h1 i { color: #c9a03d; }
        .card-body { padding: 28px; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #0a1a3a; font-size: 13px; }
        label i { margin-right: 8px; color: #c9a03d; }
        input, select, textarea { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 14px; transition: all 0.3s; }
        input:focus, select:focus { outline: none; border-color: #c9a03d; }
        
        .btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 24px; border-radius: 40px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; border: none; }
        .btn-primary { background: linear-gradient(135deg, #c9a03d, #e6c468); color: #0a1a3a; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(201,160,61,0.4); }
        .btn-outline { background: transparent; border: 2px solid #c9a03d; color: #c9a03d; }
        .btn-group { display: flex; gap: 15px; justify-content: flex-end; margin-top: 20px; }
        
        .simulacao-resultado { background: #e8f5e9; border-left: 4px solid #2e7d32; padding: 20px; border-radius: 12px; margin: 20px 0; display: none; }
        .alert { padding: 15px 20px; border-radius: 15px; margin-bottom: 20px; display: none; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
        .alert-error { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
        
        .info-cliente { background: #e3f2fd; padding: 15px 20px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .info-cliente i { font-size: 40px; color: #c9a03d; }
        
        .footer {
            background: #0a1a3a;
            color: white;
            text-align: center;
            padding: 30px;
            border-top: 2px solid #c9a03d;
            margin-top: 40px;
        }
        .footer .gold { color: #c9a03d; }
        
        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .nav-link { padding: 8px 16px; font-size: 12px; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-landmark"></i></div>
                    <div class="logo-text">
                        <h1>SGEB Angola</h1>
                        <p>SOLICITAR EMPRÉSTIMO</p>
                    </div>
                </div>
                <nav class="nav-menu">
                    <a href="dashboard-cliente.html" class="nav-link"><i class="fas fa-home"></i> Início</a>
                    <a href="solicitar-emprestimo-cliente.html" class="nav-link active"><i class="fas fa-hand-holding-usd"></i> Solicitar</a>
                    <a href="meus-emprestimos.html" class="nav-link"><i class="fas fa-list"></i> Meus Empréstimos</a>
                    <a href="perfil-cliente.html" class="nav-link"><i class="fas fa-user"></i> Meu Perfil</a>
                    <a href="logout.html" class="nav-link btn-sair"><i class="fas fa-sign-out-alt"></i> Sair</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="card">
                <div class="card-header">
                    <h1><i class="fas fa-hand-holding-usd"></i> Solicitar Empréstimo</h1>
                </div>
                <div class="card-body">
                    <div id="mensagem" class="alert"></div>
                    
                    <div class="info-cliente" id="infoCliente">
                        <i class="fas fa-user-circle"></i>
                        <div><strong id="clienteNome">Carregando...</strong><br><small id="clienteEmail"></small></div>
                    </div>

                    <form id="formSolicitacao">
                        <div class="form-row">
                            <div class="form-group"><label><i class="fas fa-money-bill-wave"></i> Valor Desejado (KZ) *</label><input type="number" id="valor" step="0.01" required></div>
                            <div class="form-group"><label><i class="fas fa-university"></i> Selecione o Banco *</label><select id="id_banco" required><option value="">-- Selecione --</option></select></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label><i class="fas fa-calendar-alt"></i> Prazo (meses) *</label><select id="prazo" required><option value="6">6 meses</option><option value="12" selected>12 meses</option><option value="18">18 meses</option><option value="24">24 meses</option><option value="36">36 meses</option></select></div>
                            <div class="form-group"><label><i class="fas fa-percent"></i> Taxa de Juros (%)</label><input type="text" id="taxa" readonly style="background:#f5f5f5;"></div>
                        </div>
                        <div class="form-group"><label><i class="fas fa-tag"></i> Finalidade</label><textarea id="finalidade" rows="2" placeholder="Descreva a finalidade do empréstimo"></textarea></div>
                        
                        <div id="simulacaoResultado" class="simulacao-resultado">
                            <strong><i class="fas fa-chart-line"></i> Resultado da Simulação:</strong>
                            <div id="simulacaoTexto" style="margin-top: 10px;"></div>
                        </div>

                        <div class="form-group"><label><input type="checkbox" id="aceitoTermos"> Declaro que as informações são verdadeiras</label></div>
                        
                        <div class="btn-group">
                            <button type="button" class="btn btn-outline" onclick="simular()"><i class="fas fa-calculator"></i> Simular</button>
                            <button type="button" class="btn btn-primary" onclick="enviarSolicitacao()"><i class="fas fa-paper-plane"></i> Enviar Solicitação</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p><span class="gold">◆</span> Complexo Escolar Fenda da Tundavala | 12ª Classe | 2025/2026 <span class="gold">◆</span></p>
            <p>Ícolo e Bengo - Angola | SGEB Angola</p>
        </div>
    </footer>

    <script>
        let clienteAtual = null;
        let bancos = [];

        function verificarLogin() {
            const cliente = JSON.parse(localStorage.getItem('cliente_logado'));
            if(!cliente || !cliente.logado) {
                window.location.href = 'login-cliente.html';
                return false;
            }
            clienteAtual = cliente;
            document.getElementById('clienteNome').innerHTML = cliente.nome;
            document.getElementById('clienteEmail').innerHTML = cliente.email;
            return true;
        }

        function carregarBancos() {
            bancos = JSON.parse(localStorage.getItem('bancos') || '[]');
            if(bancos.length === 0) {
                bancos = [
                    { id:1, nome:'BAI', taxa:2.5 }, { id:2, nome:'BFA', taxa:2.8 }, { id:3, nome:'BIC', taxa:3.0 },
                    { id:4, nome:'Banco Económico', taxa:2.7 }, { id:5, nome:'BMA', taxa:2.9 }, { id:6, nome:'BNI', taxa:3.2 }
                ];
                localStorage.setItem('bancos', JSON.stringify(bancos));
            }
            const select = document.getElementById('id_banco');
            select.innerHTML = '<option value="">-- Selecione --</option>' + 
                bancos.map(b => `<option value="${b.id}" data-taxa="${b.taxa}">${b.nome} (${b.taxa}% a.m.)</option>`).join('');
        }

        document.getElementById('id_banco')?.addEventListener('change', function() {
            const taxa = this.options[this.selectedIndex]?.getAttribute('data-taxa');
            document.getElementById('taxa').value = taxa || '';
        });

        function simular() {
            const valor = parseFloat(document.getElementById('valor').value);
            const taxa = parseFloat(document.getElementById('taxa').value);
            const prazo = parseInt(document.getElementById('prazo').value);
            
            if(isNaN(valor) || valor <= 0) { alert('Informe um valor válido!'); return; }
            if(!taxa) { alert('Selecione um banco!'); return; }
            
            const tm = taxa / 100;
            const parcela = valor * (tm * Math.pow(1+tm, prazo)) / (Math.pow(1+tm, prazo)-1);
            const total = parcela * prazo;
            const juros = total - valor;
            
            document.getElementById('simulacaoTexto').innerHTML = `
                <strong>Valor:</strong> KZ ${valor.toLocaleString('pt-BR', {minimumFractionDigits:2})}<br>
                <strong>Taxa:</strong> ${taxa}% ao mês<br>
                <strong>Prazo:</strong> ${prazo} meses<br>
                <strong>Parcela:</strong> <span style="color:#2e7d32; font-size:16px;">KZ ${parcela.toLocaleString('pt-BR', {minimumFractionDigits:2})}</span><br>
                <strong>Total a pagar:</strong> KZ ${total.toLocaleString('pt-BR', {minimumFractionDigits:2})}<br>
                <strong>Juros:</strong> KZ ${juros.toLocaleString('pt-BR', {minimumFractionDigits:2})}
            `;
            document.getElementById('simulacaoResultado').style.display = 'block';
        }

        function mostrarMensagem(mensagem, tipo) {
            const msgDiv = document.getElementById('mensagem');
            msgDiv.innerHTML = `<i class="fas ${tipo==='error'?'fa-exclamation-triangle':'fa-check-circle'}"></i> ${mensagem}`;
            msgDiv.className = `alert alert-${tipo==='error'?'error':'success'}`;
            msgDiv.style.display = 'block';
            setTimeout(() => { msgDiv.style.display = 'none'; }, 4000);
        }

        function enviarSolicitacao() {
            const valor = parseFloat(document.getElementById('valor').value);
            const bancoId = parseInt(document.getElementById('id_banco').value);
            const prazo = parseInt(document.getElementById('prazo').value);
            const taxa = parseFloat(document.getElementById('taxa').value);
            const finalidade = document.getElementById('finalidade').value;
            const aceito = document.getElementById('aceitoTermos').checked;
            
            if(!valor || valor <= 0) { mostrarMensagem('Informe o valor desejado!', 'error'); return; }
            if(!bancoId) { mostrarMensagem('Selecione um banco!', 'error'); return; }
            if(!aceito) { mostrarMensagem('Aceite os termos!', 'error'); return; }
            
            const tm = taxa / 100;
            const parcela = valor * (tm * Math.pow(1+tm, prazo)) / (Math.pow(1+tm, prazo)-1);
            const total = parcela * prazo;
            const protocolo = 'SGEB-' + Date.now();
            
            const novaSolicitacao = {
                id: Date.now(),
                id_cliente: clienteAtual.id,
                id_banco: bancoId,
                valor: valor,
                taxa: taxa,
                prazo: prazo,
                valor_parcela: parcela,
                total: total,
                finalidade: finalidade,
                status: 'pendente',
                data_solicitacao: new Date().toISOString().split('T')[0],
                protocolo: protocolo,
                pago: 0
            };
            
            let emprestimos = JSON.parse(localStorage.getItem('emprestimos') || '[]');
            emprestimos.push(novaSolicitacao);
            localStorage.setItem('emprestimos', JSON.stringify(emprestimos));
            
            mostrarMensagem(`Solicitação enviada! Protocolo: ${protocolo}`, 'success');
            setTimeout(() => { window.location.href = 'dashboard-cliente.html'; }, 2000);
        }

        if(verificarLogin()) carregarBancos();
    </script>
</body>
</html>
